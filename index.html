<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visitas Digital</title>
    <!-- Biblioteca para gerar QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            padding-bottom: 25px;
        }

        .header-bg {
            background: var(--secondary-color);
            height: 100px;
            margin-bottom: 60px;
            position: relative;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 5px solid var(--card-bg);
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            object-fit: cover;
            background: #eee;
        }

        h2 {
            margin: 10px 0 5px;
            color: var(--secondary-color);
        }

        .cargo {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .links-container {
            padding: 0 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-vcard {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
        }

        .btn-linkedin {
            background-color: #0077b5;
            color: white;
        }

        .btn-outline {
            border: 1px solid #ddd;
            color: var(--secondary-color);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding: 10px;
        }

        .footer-text {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 10px;
        }

        /* Nova estilização para o QR Code com Logo */
        #qrcode-container {
            position: relative;
            /* Necessário para alinhar o logo dentro */
            display: inline-block;
            margin-top: 20px;
            padding: 10px;
            background: white;
            /* Garante fundo branco para o código */
            border-radius: 10px;
        }

        /* Alinha o QR Code gerado pelo JS */
        #qrcode {
            display: flex;
            justify-content: center;
        }

        /* Estilo do Logo sobreposto */
        .qr-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Centraliza perfeitamente */
            width: 35px;
            /* Tamanho do logo (não aumente muito!) */
            height: 35px;
            background-color: white;
            /* Borda branca ao redor do logo */
            padding: 3px;
            border-radius: 5px;
            /* Deixa o fundo do logo redondinho */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            /* Sombra leve para destacar */
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header-bg">
            <!-- Substitua pela URL da sua foto -->
            <img src="assets/valmir.png" alt="Foto de Perfil" class="profile-img">
        </div>

        <h2>Valmir Macedo</h2>
        <div class="cargo">Chefe de Seção</div>

        <div class="links-container">
            <!-- Botão VCard -->
            <button onclick="gerarVCard()" class="btn btn-vcard">
                <i class="fas fa-user-plus"></i> Salvar Contato
            </button>

            <a href="https://wa.me/5541998274698" class="btn btn-whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <a href="tel:+551127638280" class="btn btn-outline">
                <i class="fas fa-phone"></i> Telefone Fixo
            </a>


            <a href="https://linkedin.com/in/valmirmacedo" class="btn btn-linkedin" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>

            <a href="mailto:valmir.macedo@sp.gov.br" class="btn btn-outline">
                <i class="fas fa-envelope"></i> E-mail
            </a>

            <div id="qrcode-container">
                <div id="qrcode"></div>
                <!-- Insira aqui o link da sua logo. Pode ser um link da internet ou arquivo local -->
                <img src="assets/logo_edesp.png" alt="Logo EDESP" class="qr-logo">
            </div>
            <div class="footer-text">Escaneie para compartilhar este cartão</div>
        </div>
    </div>

    <script>
        // 1. DADOS DO CONTATO
        const dadosContato = {
            nome: "Valmir",
            sobrenome: "Macedo",
            empresa: "Escola de Desenvolvimento Social do Estado de São Paulo - EDESP",
            cargo: "Chefe de Seção",
            celular: "+5541998274698",
            fixo: "+551127638280",
            email: "valmir.macedo@sp.gov.br",
            site: "www.desenvolvimentosocial.sp.gov.br"
        };

        // 2. FUNÇÃO PARA GERAR E BAIXAR O VCARD (.VCF)
        function gerarVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${dadosContato.nome}
ORG:${dadosContato.empresa}
TITLE:${dadosContato.cargo}
TEL;TYPE=CELL:${dadosContato.celular}
TEL;TYPE=WORK:${dadosContato.fixo}
EMAIL:${dadosContato.email}
URL:${dadosContato.site}
END:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${dadosContato.nome}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 3. GERAÇÃO AUTOMÁTICA DO QR CODE
        // Ele pega a URL atual do navegador (window.location.href)
        window.onload = function () {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href, // Mantém o fluxo Recomendado (abre o site)
                width: 130, // Aumentei um pouquinho o tamanho para acomodar o logo
                height: 130,
                colorDark: "#000000", // Preto padrão para melhor leitura
                colorLight: "#ffffff",
                // ESTA É A CONFIGURAÇÃO MAIS IMPORTANTE:
                correctLevel: QRCode.CorrectLevel.H
            });
        };
    </script>

</body>

</html>
